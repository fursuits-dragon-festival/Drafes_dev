<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 230">
  <!-- Shadow -->
  <ellipse cx="95" cy="223" rx="54" ry="8" fill="rgba(0,0,0,0.07)"/>

  <!-- Tail -->
  <path d="M 128 170 C 162 175 175 158 168 140 C 162 124 143 120 148 108" stroke="#3A9050" stroke-width="13" fill="none" stroke-linecap="round"/>
