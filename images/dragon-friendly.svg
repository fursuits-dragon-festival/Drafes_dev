  <path d="M 148,103 L 140,95 C 138,88 148,82 152,90 L 158,84 C 164,88 162,96 156,100 Z" fill="#267040"/>

  <!-- Back Wings -->
  <path d="M 60 100 C 20 74 14 28 36 10 C 56 -6 82 24 76 70 Z" fill="#5AC870" opacity="0.85"/>
  <path d="M 130 100 C 170 74 176 28 154 10 C 134 -6 108 24 114 70 Z" fill="#5AC870" opacity="0.85"/>
  <!-- Wing details -->
  <path d="M 76,70 C 60,52 44,26 38,12" stroke="#3A9050" stroke-width="1.3" fill="none" opacity="0.65"/>
  <path d="M 76,70 C 56,55 38,32 30,16" stroke="#3A9050" stroke-width="1.3" fill="none" opacity="0.65"/>
  <path d="M 114,70 C 130,52 146,26 152,12" stroke="#3A9050" stroke-width="1.3" fill="none" opacity="0.65"/>
  <path d="M 114,70 C 134,55 152,32 160,16" stroke="#3A9050" stroke-width="1.3" fill="none" opacity="0.65"/>

  <!-- Body -->
  <ellipse cx="95" cy="158" rx="50" ry="44" fill="#44B060"/>
  <!-- Belly (light cream) -->
  <ellipse cx="95" cy="164" rx="32" ry="29" fill="#C8EED0"/>
  <!-- Belly spots/pattern -->
  <circle cx="88" cy="158" r="5" fill="#A8D8B0" opacity="0.5"/>
  <circle cx="102" cy="163" r="4" fill="#A8D8B0" opacity="0.5"/>
  <circle cx="90" cy="170" r="3.5" fill="#A8D8B0" opacity="0.4"/>

  <!-- Left arm (relaxed down) -->
  <path d="M 48 148 C 33 155 27 168 38 176" stroke="#44B060" stroke-width="14" fill="none" stroke-linecap="round"/>
  <circle cx="38" cy="177" r="13" fill="#44B060"/>
  <path d="M 28,183 L 22,192" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 35,186 L 32,196" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 43,186 L 43,196" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Right arm (raised, waving!) -->
  <path d="M 142 145 C 158 135 168 118 158 106" stroke="#44B060" stroke-width="14" fill="none" stroke-linecap="round"/>
  <circle cx="158" cy="104" r="13" fill="#44B060"/>
  <path d="M 162,94 L 168,86" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 156,92 L 160,83" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 150,94 L 151,85" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Legs -->
  <ellipse cx="72" cy="196" rx="20" ry="14" fill="#3A9050"/>
  <ellipse cx="118" cy="196" rx="20" ry="14" fill="#3A9050"/>
  <path d="M 58,203 L 52,213" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 66,206 L 63,217" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 75,207 L 74,218" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 132,203 L 138,213" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 124,206 L 127,217" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 115,207 L 116,218" stroke="#267040" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="95" cy="82" r="40" fill="#55BB6A"/>
  <!-- Head lighter top -->
  <circle cx="95" cy="70" r="22" fill="#66CC7A" opacity="0.4"/>

  <!-- Horns (shorter, rounder) -->
  <path d="M 74,57 L 66,30 L 82,53" fill="#3A9050"/>
  <path d="M 116,57 L 124,30 L 108,53" fill="#3A9050"/>
  <path d="M 70,50 L 68,34" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 120,50 L 122,34" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>

  <!-- Ears/head frills -->
  <ellipse cx="58" cy="72" rx="11" ry="18" fill="#55BB6A" transform="rotate(-22,58,72)"/>
  <ellipse cx="132" cy="72" rx="11" ry="18" fill="#55BB6A" transform="rotate(22,132,72)"/>
  <ellipse cx="58" cy="74" rx="6.5" ry="11" fill="#3A9050" transform="rotate(-22,58,74)"/>
  <ellipse cx="132" cy="74" rx="6.5" ry="11" fill="#3A9050" transform="rotate(22,132,74)"/>

  <!-- Eyes (round, very friendly) -->
  <circle cx="80" cy="80" r="14" fill="white"/>
  <circle cx="110" cy="80" r="14" fill="white"/>
  <!-- Iris (warm amber/brown) -->
  <circle cx="81" cy="81" r="10" fill="#8B5E00"/>
  <circle cx="111" cy="81" r="10" fill="#8B5E00"/>
  <!-- Pupil -->
  <circle cx="82" cy="82" r="6.5" fill="#1a1a0a"/>
  <circle cx="112" cy="82" r="6.5" fill="#1a1a0a"/>
  <!-- Eye shine -->
  <circle cx="78.5" cy="77.5" r="3.5" fill="white"/>
  <circle cx="108.5" cy="77.5" r="3.5" fill="white"/>
  <circle cx="83.5" cy="84" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="113.5" cy="84" r="1.5" fill="rgba(255,255,255,0.6)"/>

  <!-- Eyebrows (friendly, raised) -->
  <path d="M 70,68 C 74,64 82,64 86,68" stroke="#3A9050" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 100,68 C 104,64 112,64 116,68" stroke="#3A9050" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Freckles / spots -->
  <circle cx="68" cy="89" r="3.5" fill="#3A9050" opacity="0.35"/>
  <circle cx="62" cy="86" r="2.5" fill="#3A9050" opacity="0.28"/>
  <circle cx="122" cy="89" r="3.5" fill="#3A9050" opacity="0.35"/>
  <circle cx="128" cy="86" r="2.5" fill="#3A9050" opacity="0.28"/>

  <!-- Nose -->
  <ellipse cx="95" cy="91" rx="8" ry="5.5" fill="#3A9050"/>
  <circle cx="91" cy="90" r="2.2" fill="rgba(0,0,0,0.2)"/>
  <circle cx="99" cy="90" r="2.2" fill="rgba(0,0,0,0.2)"/>

  <!-- Mouth (big happy open smile) -->
  <path d="M 80,101 Q 95,116 110,101" stroke="#267040" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <path d="M 82,101 Q 95,114 108,101 L 106,101 Q 95,112 84,101 Z" fill="white" opacity="0.8"/>

  <!-- Little tongue peeking -->
  <ellipse cx="95" cy="110" rx="7" ry="5" fill="#FF9090"/>

  <!-- Decorative leaf shapes around -->
  <path d="M 22,120 C 16,110 22,100 30,104 C 26,112 30,120 22,120 Z" fill="#55BB6A" opacity="0.5"/>
  <path d="M 165,55 C 170,45 178,46 178,54 C 172,55 168,62 165,55 Z" fill="#5AC870" opacity="0.5"/>

  <!-- Star sparkle -->
  <path d="M 160,130 L 162,122 L 164,130 L 172,132 L 164,134 L 162,142 L 160,134 L 152,132 Z" fill="#FFD700" opacity="0.8"/>
</svg>
