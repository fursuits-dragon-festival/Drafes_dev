  <ellipse cx="90" cy="93" rx="8" ry="5.5" fill="#FF7A9A"/>
  <circle cx="86.5" cy="91.5" r="2.2" fill="rgba(0,0,0,0.18)"/>
  <circle cx="93.5" cy="91.5" r="2.2" fill="rgba(0,0,0,0.18)"/>

  <!-- Mouth / Happy smile -->
  <path d="M 78,102 Q 90,114 102,102" stroke="#D4245C" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- Little teeth -->
  <rect x="83" y="102" width="6" height="5" rx="1" fill="white"/>
  <rect x="91" y="102" width="6" height="5" rx="1" fill="white"/>

  <!-- Sparkle decorations -->
  <path d="M 152,58 L 154,50 L 156,58 L 164,60 L 156,62 L 154,70 L 152,62 L 144,60 Z" fill="#FFD700" opacity="0.85"/>
  <path d="M 20,80 L 21.5,74 L 23,80 L 29,81.5 L 23,83 L 21.5,89 L 20,83 L 14,81.5 Z" fill="#FFD700" opacity="0.7"/>
</svg>
