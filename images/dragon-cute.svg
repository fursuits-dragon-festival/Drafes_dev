  <path d="M 67,72 C 66,67 68,65 70,67" stroke="#E8306A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 72,70 C 72,65 74,64 75,66" stroke="#E8306A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 77,69 C 78,64 80,64 80,67" stroke="#E8306A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 97,69 C 98,64 100,64 100,67" stroke="#E8306A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 102,70 C 102,65 104,64 105,66" stroke="#E8306A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 107,72 C 108,67 110,65 112,67" stroke="#E8306A" stroke-width="1.5" fill="none" stroke-linecap="round"/>

