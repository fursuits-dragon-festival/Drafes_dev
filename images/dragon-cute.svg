  <circle cx="76" cy="82" r="10" fill="#6DC4E8"/>
  <circle cx="106" cy="82" r="10" fill="#6DC4E8"/>
  <!-- Pupil -->
  <circle cx="77" cy="83" r="6.5" fill="#1a1a2e"/>
  <circle cx="107" cy="83" r="6.5" fill="#1a1a2e"/>
