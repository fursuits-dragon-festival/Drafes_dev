  <ellipse cx="125" cy="70" rx="11" ry="17" fill="#FFBDCC" transform="rotate(25,125,70)"/>
  <ellipse cx="55" cy="72" rx="6.5" ry="11" fill="#FF9AB5" transform="rotate(-25,55,72)"/>
  <ellipse cx="125" cy="72" rx="6.5" ry="11" fill="#FF9AB5" transform="rotate(25,125,72)"/>

  <!-- Eyes white -->
  <circle cx="75" cy="81" r="14" fill="white"/>
  <circle cx="105" cy="81" r="14" fill="white"/>
