  <circle cx="74" cy="79" r="3.5" fill="white"/>
  <circle cx="104" cy="79" r="3.5" fill="white"/>
  <circle cx="78.5" cy="85" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="108.5" cy="85" r="1.5" fill="rgba(255,255,255,0.7)"/>

