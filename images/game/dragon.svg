<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <rect width="80" height="80" rx="14" fill="#0d1535"/>
  <!-- wings -->
  <path d="M30 44 C8 32 10 52 26 48Z" fill="#C87800" opacity="0.82"/>
  <path d="M50 44 C72 32 70 52 54 48Z" fill="#C87800" opacity="0.82"/>
  <!-- body -->
  <ellipse cx="40" cy="50" rx="18" ry="13" fill="#FFB300"/>
  <!-- head -->
  <ellipse cx="40" cy="30" rx="13" ry="12" fill="#FFC840"/>
  <!-- snout -->
  <ellipse cx="40" cy="35" rx="7" ry="5" fill="#FFD870"/>
  <!-- horns -->
  <line x1="35" y1="20" x2="32" y2="10" stroke="#FF9000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="45" y1="20" x2="48" y2="10" stroke="#FF9000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- eye -->
  <circle cx="46" cy="28" r="3.2" fill="#1a0a00"/>
  <circle cx="47" cy="27" r="1.3" fill="white"/>
  <!-- tail -->
  <path d="M24 54 C8 64 16 76 26 68" stroke="#E09000" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- label -->
  <text x="40" y="75" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(255,179,0,0.55)" letter-spacing="1">DRAGON</text>
</svg>
