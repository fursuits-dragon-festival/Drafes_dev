  <ellipse cx="100" cy="168" rx="28" ry="26" fill="#3D6EC0"/>
  <!-- Belly scale pattern -->
  <ellipse cx="100" cy="158" rx="20" ry="14" fill="#4A7ACC" opacity="0.5"/>
  <ellipse cx="100" cy="172" rx="22" ry="10" fill="#4A7ACC" opacity="0.4"/>

  <!-- Left arm/wing claw -->
  <path d="M 56 152 C 40 158 32 170 42 178" stroke="#2855A0" stroke-width="14" fill="none" stroke-linecap="round"/>
  <circle cx="42" cy="179" r="13" fill="#2855A0"/>
  <!-- Claws left -->
  <path d="M 32,184 L 26,194" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 39,187 L 35,197" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 46,187 L 45,197" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right arm wing claw (raised) -->
  <path d="M 144 152 C 160 145 170 132 162 120" stroke="#2855A0" stroke-width="14" fill="none" stroke-linecap="round"/>
  <circle cx="162" cy="119" r="13" fill="#2855A0"/>
  <!-- Claws right (pointing up-forward, commanding) -->
  <path d="M 168,110 L 174,103" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 162,108 L 165,100" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 156,110 L 156,102" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Legs -->
  <ellipse cx="76" cy="200" rx="19" ry="14" fill="#2350A0"/>
  <ellipse cx="124" cy="200" rx="19" ry="14" fill="#2350A0"/>
  <!-- Foot spikes/claws -->
  <path d="M 62,207 L 56,218" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 70,210 L 67,221" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 79,211 L 78,222" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 138,207 L 144,218" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 130,210 L 133,221" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 121,211 L 122,222" stroke="#C0A020" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Neck -->
  <ellipse cx="100" cy="120" rx="28" ry="22" fill="#2855A0"/>

  <!-- Head -->
  <ellipse cx="100" cy="88" rx="38" ry="34" fill="#2C5CB0"/>
  <!-- Head underside lighter -->
  <ellipse cx="100" cy="98" rx="28" ry="20" fill="#3D6EC0" opacity="0.6"/>

  <!-- Horns (long, swept back) -->
  <path d="M 72,66 C 60,40 52,18 62,5 C 68,15 68,42 78,62 Z" fill="#1A3060"/>
  <path d="M 128,66 C 140,40 148,18 138,5 C 132,15 132,42 122,62 Z" fill="#1A3060"/>
  <!-- Gold horn tips -->
  <ellipse cx="62" cy="8" rx="5" ry="7" fill="#C0A020" transform="rotate(-10,62,8)"/>
  <ellipse cx="138" cy="8" rx="5" ry="7" fill="#C0A020" transform="rotate(10,138,8)"/>

  <!-- Side face spines/frills -->
  <path d="M 64,72 C 52,68 44,58 50,50" stroke="#1A3060" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 136,72 C 148,68 156,58 150,50" stroke="#1A3060" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Eyes — sharp, glowing -->
  <ellipse cx="83" cy="84" rx="13" ry="11" fill="#0A0A20"/>
  <ellipse cx="117" cy="84" rx="13" ry="11" fill="#0A0A20"/>
  <!-- Iris glow -->
  <ellipse cx="83" cy="84" rx="9" ry="8" fill="#00CCFF"/>
  <ellipse cx="117" cy="84" rx="9" ry="8" fill="#00CCFF"/>
  <!-- Slit pupil -->
  <ellipse cx="83" cy="84" rx="3" ry="7" fill="#00406A"/>
  <ellipse cx="117" cy="84" rx="3" ry="7" fill="#00406A"/>
  <!-- Glow ring -->
  <ellipse cx="83" cy="84" rx="10" ry="9" fill="none" stroke="#80EEFF" stroke-width="1" opacity="0.6"/>
  <ellipse cx="117" cy="84" rx="10" ry="9" fill="none" stroke="#80EEFF" stroke-width="1" opacity="0.6"/>
  <!-- Eye shine -->
  <circle cx="79" cy="80" r="2.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="113" cy="80" r="2.5" fill="rgba(255,255,255,0.8)"/>
  <!-- Eye ridge/brow (sharp, angled) -->
  <path d="M 72,75 L 95,77" stroke="#1A3060" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 128,75 L 105,77" stroke="#1A3060" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Snout (angular) -->
  <path d="M 86,96 L 100,108 L 114,96" fill="#2350A0"/>
  <ellipse cx="93" cy="100" rx="4" ry="3" fill="#1A3060" opacity="0.6"/>
  <ellipse cx="107" cy="100" rx="4" ry="3" fill="#1A3060" opacity="0.6"/>

  <!-- Mouth line -->
  <path d="M 88,107 L 100,112 L 112,107" stroke="#1A3060" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Fang peek -->
  <path d="M 95,108 L 93,115" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 105,108 L 107,115" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Dorsal spines on head/neck -->
  <path d="M 100,54 L 96,42 L 100,56" fill="#C0A020" opacity="0.9"/>
  <path d="M 95,58 L 91,46 L 95,60" fill="#C0A020" opacity="0.8"/>
  <path d="M 105,58 L 109,46 L 105,60" fill="#C0A020" opacity="0.8"/>

  <!-- Gold scale accents on body -->
  <path d="M 82,145 C 86,140 94,140 98,145" stroke="#C0A020" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 90,138 C 94,133 102,133 106,138" stroke="#C0A020" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 76,153 C 80,148 88,148 92,153" stroke="#C0A020" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Glowing eye aura -->
  <ellipse cx="83" cy="84" rx="14" ry="12" fill="none" stroke="#00CCFF" stroke-width="2" opacity="0.25"/>
  <ellipse cx="117" cy="84" rx="14" ry="12" fill="none" stroke="#00CCFF" stroke-width="2" opacity="0.25"/>
</svg>
