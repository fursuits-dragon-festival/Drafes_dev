  <path d="M 142 90 C 195 65 210 10 180 -5 C 152 -18 128 30 128 78 Z" fill="#2A4A8A" opacity="0.8"/>
  <!-- Wing membranes highlight -->
  <path d="M 72,78 C 50,58 30,28 22,-3" stroke="#4A7ACC" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 72,78 C 45,60 22,35 16,8" stroke="#4A7ACC" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 72,78 C 58,52 40,22 28,2" stroke="#4A7ACC" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 128,78 C 150,58 170,28 178,-3" stroke="#4A7ACC" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 128,78 C 155,60 178,35 184,8" stroke="#4A7ACC" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 128,78 C 142,52 160,22 172,2" stroke="#4A7ACC" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Tail -->
  <path d="M 130 175 C 165 180 185 162 178 143 C 172 126 152 122 158 108" stroke="#1E3870" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 158,103 C 153,96 162,88 165,96 C 170,90 180,93 175,100 C 178,106 168,110 160,106 Z" fill="#C0A020"/>

  <!-- Body -->
  <ellipse cx="100" cy="162" rx="46" ry="42" fill="#2855A0"/>
