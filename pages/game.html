<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dragon Gem Catcher</title>
  <script src="../js/const.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080c24;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      min-height: 100vh; /* fallback */
      padding: max(48px, calc(env(safe-area-inset-top, 0px) + 36px)) env(safe-area-inset-right, 0px) max(20px, env(safe-area-inset-bottom, 0px)) env(safe-area-inset-left, 0px);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    #game-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      max-width: 100%;
    }

    #back-link {
      position: fixed;
      top: max(14px, calc(env(safe-area-inset-top, 0px) + 14px));
      left: max(18px, calc(env(safe-area-inset-left, 0px) + 18px));
      color: rgba(255,255,255,.35);
      font-size: .78rem;
      text-decoration: none;
      letter-spacing: .08em;
      transition: color .25s;
      z-index: 10;
    }
    #back-link:hover { color: rgba(255,220,100,.80); }

    canvas {
      display: block;
      border-radius: 14px;
      box-shadow: 0 0 60px rgba(255,179,0,.18), 0 0 0 1px rgba(255,179,0,.12);
      touch-action: none;
      cursor: none; /* hide cursor over canvas — dragon follows it */
    }

    #title-text {
      font-size: 1.05rem;
      letter-spacing: .22em;
      color: rgba(255,210,80,.70);
      text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>
<body>

<a href="../index.html" id="back-link">← トップへ</a>

<div id="game-wrap" style="position:relative;">
  <div id="title-text">Dragon Gem Catcher</div>
  <canvas id="c"></canvas>
  <!-- ハイスコア時 X ID 入力オーバーレイ -->
  <div id="xid-overlay" style="display:none;position:absolute;left:50%;transform:translateX(-50%);background:rgba(10,14,42,.92);border:1.5px solid rgba(62,238,173,.6);border-radius:10px;padding:16px 20px;text-align:center;width:260px;z-index:10;">
    <p style="font-size:.78rem;color:#3EEEAD;font-weight:700;margin-bottom:10px;">X IDを登録してスコアを送信</p>
    <input id="xid-overlay-input" type="text" placeholder="@example" autocomplete="off"
      style="width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:6px;color:#fff;padding:7px 10px;font-size:.88rem;outline:none;box-sizing:border-box;margin-bottom:10px;">
    <button id="xid-overlay-submit" style="width:100%;background:#3EEEAD;color:#0a0e2a;border:none;border-radius:6px;padding:8px;font-size:.88rem;font-weight:700;cursor:pointer;">送信する</button>
    <p id="xid-overlay-msg" style="display:none;margin-top:8px;font-size:.75rem;color:rgba(255,255,255,.7);"></p>
  </div>
</div>

<script>
(function() {
  'use strict';

  // --- Canvas setup ---
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = 360, H = 580;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  ctx.scale(DPR, DPR);

  // Responsive canvas: scale to fit viewport while preserving aspect ratio
  function resizeCanvas() {
    const maxW = Math.min(W, window.innerWidth - 20);
    const scale = maxW / W;
    canvas.style.width  = maxW + 'px';
    canvas.style.height = Math.round(H * scale) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas, { passive: true });

  // roundRect polyfill
  if (!ctx.roundRect) {
    ctx.roundRect = function(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    };
  }

  // ============================================================
  // IMAGE ASSETS — 画像ファイルで差し替える場合はこちらを編集
  // Place files in:  ../images/game/
  //
  //   dragon.png  … ドラゴンキャラクター (推奨サイズ: 80×80px)
  //   gem_gold.png    gem_ruby.png    gem_emerald.png
  //               … 各宝石アイコン (推奨サイズ: 40×40px)
  //   bg.png      … ゲーム背景 (360×580px)
  //
  // ファイルが存在しない（またはIMG_ENABLED=false）の場合は
  // Canvas描画にフォールバックします。
  // ============================================================
  const IMG_ENABLED = true;  // SVGモック画像を使用（実画像差し替え時は .png に変更）
  const ASSET_PATH  = '../images/game/';
  const IMG = {};  // { dragon, gemGold, gemRuby, gemEmerald, bg }

  function loadImages(cb) {
    if (!IMG_ENABLED) { cb(); return; }
    const entries = [
      ['dragon',     'dragon.png'],
      ['gemGold',    'gem_gold.svg'],
      ['gemRuby',    'gem_ruby.svg'],
      ['gemEmerald', 'gem_emerald.svg'],
      ['bg',         'bg.svg'],
    ];
    let pending = entries.length;
    entries.forEach(([key, file]) => {
      const img = new Image();
      img.onload  = () => { IMG[key] = img; if (--pending === 0) cb(); };
      img.onerror = () => {           if (--pending === 0) cb(); }; // fallback to canvas
      img.src = ASSET_PATH + file;
    });
  }

  // --- Constants ---
  const GEM_TYPES = [
    { color: '#FFD040', glow: '#FFB300', pts: 1, label: 'gold'    },
    { color: '#FF5090', glow: '#D91A4D', pts: 2, label: 'ruby'    },
    { color: '#3EEEAD', glow: '#15D698', pts: 3, label: 'emerald' },
  ];
  const GEM_SIZE = 16;
  const HI_KEY = 'df_hi';
  const LIVES_MAX = 3;
  const BASE_SPEED = 2.2;
  // Dragon movement margin — dragon center can reach anywhere in [MARGIN, W-MARGIN].
  // Gems spawn in the same range, so every gem is always catchable.
  const MARGIN = 20;
  const CATCH_R = 30;

  // --- Score submission ---
  // GAS URLはconst.jsで管理（ページにconst.jsを読み込んでいないため直接参照）
  const GAS_BASE = typeof CONST !== 'undefined' ? CONST.GAS_BASE : 'https://script.google.com/macros/s/AKfycbwEXpus0oHc_144miR-RH9Y_h2-iHd97csVdmXODtB6f0fqQIL6jBidIZvVt5TCQeLp/exec';
  let scoreSubmitMsg = '';
  let scoreXId = localStorage.getItem('df_game_xid') || '';
  let pendingScore = 0;           // X ID 入力待ちのスコア
  let scoreSubmitted = false;     // このゲームオーバーで送信済みか

  // スコアをGASに送信（Promise返却）
  function sendScoreToServer(xId, finalScore) {
    return fetch(GAS_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'submit_score', xId: xId, score: finalScore })
    }).then(function(r) { return r.json(); });
  }

  // ゲームオーバー時: X IDがあれば即送信、なければオーバーレイを表示
  function handleGameOver(finalScore) {
    scoreSubmitted = false;
    pendingScore   = finalScore;
    if (!scoreXId) {
      showXidOverlay();
      return;
    }
    // X IDキャッシュあり → 自動送信
    scoreSubmitMsg = '送信中...';
    sendScoreToServer(scoreXId, finalScore).then(function(res) {
      scoreSubmitMsg = res.ok
        ? (res.newBest ? 'ハイスコア更新！サーバーに送信しました' : 'スコアを送信しました')
        : '送信失敗';
      scoreSubmitted = true;
    }).catch(function() { scoreSubmitMsg = '送信失敗（通信エラー）'; });
  }

  // X ID オーバーレイを表示（ゲームオーバー画面上）
  const xidOverlay     = document.getElementById('xid-overlay');
  const xidInput       = document.getElementById('xid-overlay-input');
  const xidSubmitBtn   = document.getElementById('xid-overlay-submit');
  const xidOverlayMsg  = document.getElementById('xid-overlay-msg');

  function showXidOverlay() {
    // キャンバスのサイズに合わせてオーバーレイを配置
    const canvasRect = canvas.getBoundingClientRect();
    const wrapRect   = canvas.parentElement.getBoundingClientRect();
    xidOverlay.style.top  = (canvasRect.top - wrapRect.top + canvasRect.height / 2 - 80) + 'px';
    xidOverlay.style.display = 'block';
    xidInput.value = '';
    xidInput.focus();
  }

  function hideXidOverlay() {
    xidOverlay.style.display = 'none';
  }

  xidSubmitBtn.addEventListener('click', function() {
    const v = xidInput.value.trim().replace(/^@/, '').toLowerCase();
    if (!v) { xidOverlayMsg.textContent = 'X IDを入力してください'; xidOverlayMsg.style.display = ''; return; }

    xidSubmitBtn.disabled    = true;
    xidSubmitBtn.textContent = '送信中...';
    xidOverlayMsg.style.display = 'none';

    sendScoreToServer(v, pendingScore).then(function(res) {
      if (res.ok) {
        scoreXId = v;
        localStorage.setItem('df_game_xid', v);
        scoreSubmitMsg = res.newBest ? 'スコアはサーバーに送信されました (' + res.score + ')' : 'スコア送信済み';
        scoreSubmitted = true;
        hideXidOverlay();
      } else {
        xidOverlayMsg.textContent   = res.message || '送信に失敗しました';
        xidOverlayMsg.style.display = '';
      }
      xidSubmitBtn.disabled    = false;
      xidSubmitBtn.textContent = '送信する';
    }).catch(function() {
      xidOverlayMsg.textContent   = '通信エラー。再度お試しください';
      xidOverlayMsg.style.display = '';
      xidSubmitBtn.disabled    = false;
      xidSubmitBtn.textContent = '送信する';
    });
  });

  // --- State ---
  let state = 'start'; // 'start' | 'playing' | 'over'
  let score = 0;
  let lives = LIVES_MAX;
  let hi = parseInt(localStorage.getItem(HI_KEY) || '0', 10);
  let gems = [];
  let particles = [];
  let missFlash = 0;
  let dragon = { x: W / 2, targetX: W / 2, vy: 0, bobT: 0 };
  let bgStars = [];
  let spawnTimer = 0;
  let spawnInterval = 82;
  let frame = 0;
  let lastTime = 0;
  let animId = null;

  // Build star field
  for (let i = 0; i < 55; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      a: Math.random() * 0.6 + 0.2,
      tw: Math.random() * Math.PI * 2,
    });
  }

  // --- Speed ---
  function speedMult() {
    return 1 + Math.floor(score / 8) * 0.12;
  }

  // --- Input ---
  const keys = {};
  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'Escape') { history.back(); return; }
    if ((e.key === ' ' || e.key === 'Enter') && state !== 'playing') startGame();
  });
  document.addEventListener('keyup',  e => { keys[e.key] = false; });

  // Touch: directly move dragon to finger position (no easing lag)
  function touchX(touch) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width; // handles CSS-scaled canvas
    return Math.max(MARGIN, Math.min(W - MARGIN, (touch.clientX - rect.left) * scaleX));
  }
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state !== 'playing') { startGame(); return; }
    dragon.x = dragon.targetX = touchX(e.touches[0]);
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    dragon.x = dragon.targetX = touchX(e.touches[0]);
  }, { passive: false });

  // Mouse: move dragon to cursor position (PC support)
  function mouseGameX(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    return Math.max(MARGIN, Math.min(W - MARGIN, (e.clientX - rect.left) * scaleX));
  }
  canvas.addEventListener('mousemove', e => {
    if (state !== 'playing') return;
    dragon.x = dragon.targetX = mouseGameX(e);
  });

  // Click to start (also sets initial position on PC)
  canvas.addEventListener('click', e => {
    if (state !== 'playing') {
      startGame();
    } else {
      dragon.x = dragon.targetX = mouseGameX(e);
    }
  });

  // --- Game init ---
  function startGame() {
    hideXidOverlay();
    score = 0; lives = LIVES_MAX;
    gems = []; particles = [];
    missFlash = 0; spawnTimer = 0; frame = 0;
    dragon.x = W / 2; dragon.targetX = W / 2; dragon.bobT = 0;
    scoreSubmitMsg = '';
    state = 'playing';
  }

  // --- Spawn gem ---
  function spawnGem() {
    const type = GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
    // Spawn within [MARGIN, W-MARGIN] — same range as dragon, so always catchable
    gems.push({
      x: MARGIN + Math.random() * (W - MARGIN * 2),
      y: 66,  // HUD（y=8〜46）より下からスポーン（シャインがHUDに隠れない）
      type,
      rot: 0,
    });
  }

  // --- Particles ---
  function burst(x, y, color) {
    for (let i = 0; i < 10; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = Math.random() * 3.5 + 1.2;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1.5,
        life: 1, decay: Math.random() * 0.04 + 0.025,
        r: Math.random() * 4 + 2,
        color,
      });
    }
  }

  // --- Draw dragon ---
  function drawDragon(x, y) {
    // 画像が読み込み済みなら描画してリターン
    if (IMG.dragon) {
      const s = 80;
      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(IMG.dragon, x - s / 2, y - s / 2, s, s);
      ctx.restore();
      return;
    }
    const cx = x, cy = y;
    // Wings (back)
    ctx.save();
    ctx.globalAlpha = 0.72;
    ctx.fillStyle = '#C87800';
    // left wing
    ctx.beginPath();
    ctx.moveTo(cx - 10, cy);
    ctx.bezierCurveTo(cx - 38, cy - 18, cx - 36, cy + 10, cx - 14, cy + 8);
    ctx.fill();
    // right wing
    ctx.beginPath();
    ctx.moveTo(cx + 10, cy);
    ctx.bezierCurveTo(cx + 38, cy - 18, cx + 36, cy + 10, cx + 14, cy + 8);
    ctx.fill();
    ctx.restore();

    // Body
    ctx.fillStyle = '#FFB300';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 4, 18, 14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#FFC840';
    ctx.beginPath();
    ctx.ellipse(cx, cy - 10, 13, 11, 0, 0, Math.PI * 2);
    ctx.fill();

    // Snout
    ctx.fillStyle = '#FFD870';
    ctx.beginPath();
    ctx.ellipse(cx, cy - 6, 7, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Horn
    ctx.strokeStyle = '#FF9000';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy - 18);
    ctx.lineTo(cx - 6, cy - 28);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + 3, cy - 18);
    ctx.lineTo(cx + 6, cy - 28);
    ctx.stroke();

    // Eye
    ctx.fillStyle = '#1a0a00';
    ctx.beginPath();
    ctx.arc(cx + 5, cy - 11, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx + 6, cy - 12, 1.2, 0, Math.PI * 2);
    ctx.fill();

    // Tail
    ctx.strokeStyle = '#E09000';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - 16, cy + 10);
    ctx.bezierCurveTo(cx - 30, cy + 20, cx - 22, cy + 32, cx - 12, cy + 26);
    ctx.stroke();
  }

  // --- Draw gem ---
  function drawGem(gem) {
    const { x, y, type, rot } = gem;
    // 画像が読み込み済みなら描画してリターン
    const imgKey = type.label === 'gold' ? 'gemGold'
                 : type.label === 'ruby' ? 'gemRuby' : 'gemEmerald';
    if (IMG[imgKey]) {
      const s = 40;
      ctx.save();
      ctx.globalAlpha  = 1;           // 毎フレーム明示リセット（透過フリッカー防止）
      ctx.shadowBlur   = 0;
      ctx.shadowColor  = 'transparent';
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(IMG[imgKey], -s / 2, -s / 2, s, s);
      ctx.restore();
      return;
    }
    const s = GEM_SIZE;
    ctx.save();
    ctx.globalAlpha  = 1;
    ctx.shadowBlur   = 0;           // shadowBlur は使わない（上端クリッピング問題を回避）
    ctx.shadowColor  = 'transparent';
    ctx.translate(x, y);
    ctx.rotate(rot);
    // グロー: 大きめのシェイプを低透明度で重ねる（shadowBlur 代替）
    ctx.globalAlpha = 0.38;
    ctx.fillStyle   = type.glow;
    ctx.beginPath();
    ctx.moveTo(0, -s * 1.4);
    ctx.lineTo(s * 0.84, 0);
    ctx.lineTo(0,  s * 1.4);
    ctx.lineTo(-s * 0.84, 0);
    ctx.closePath();
    ctx.fill();
    // ボディ
    ctx.globalAlpha = 1;
    ctx.fillStyle   = type.color;
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s * 0.6, 0);
    ctx.lineTo(0, s);
    ctx.lineTo(-s * 0.6, 0);
    ctx.closePath();
    ctx.fill();
    // シャイン（白ハイライト）
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s * 0.3, -s * 0.3);
    ctx.lineTo(0, 0);
    ctx.lineTo(-s * 0.3, -s * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();  // パスをクリア（残存パスが次の描画に影響しないよう）
    ctx.restore();
  }

  // --- Draw HUD ---
  function drawHUD() {
    // Score box
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.roundRect(8, 8, 88, 38, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,210,60,.90)';
    ctx.font = 'bold 20px monospace';
    ctx.fillText(score, 16, 32);
    ctx.font = '10px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.40)';
    ctx.fillText('SCORE', 16, 42);
    ctx.restore();

    // Best
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.roundRect(W/2 - 44, 8, 88, 38, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(200,255,220,.70)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('BEST', W/2, 22);
    ctx.fillStyle = 'rgba(255,255,255,.80)';
    ctx.font = 'bold 16px monospace';
    ctx.fillText(hi, W/2, 40);
    ctx.restore();

    // Lives
    ctx.save();
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.roundRect(W - 72, 8, 64, 38, 8);
    ctx.fill();
    ctx.font = '10px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.40)';
    ctx.fillText('LIVES', W - 12, 22);
    const hearts = ['♥', '♥', '♥'];
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = i < lives ? '#FF5090' : 'rgba(255,255,255,.18)';
      ctx.font = '14px sans-serif';
      ctx.fillText(hearts[i], W - 14 - i * 18, 38);
    }
    ctx.restore();
  }

  // --- Draw background ---
  function drawBG(t) {
    ctx.save();  // save/restoreで状態を完全に分離（alphaリーク防止）
    ctx.shadowBlur  = 0;
    ctx.shadowColor = 'transparent';

    if (IMG.bg) {
      ctx.globalAlpha = 1;
      ctx.drawImage(IMG.bg, 0, 0, W, H);
      for (const s of bgStars) {
        s.tw += 0.018;
        ctx.globalAlpha = s.a * (0.5 + 0.5 * Math.sin(s.tw));
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0,   '#07091e');
      grad.addColorStop(0.5, '#0a0e2a');
      grad.addColorStop(1,   '#0d1535');
      ctx.globalAlpha = 1;
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      for (const s of bgStars) {
        s.tw += 0.018;
        ctx.globalAlpha = s.a * (0.5 + 0.5 * Math.sin(s.tw));
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();  // globalAlpha を含む全状態をリセット
  }

  // --- Screens ---
  function drawStartScreen() {
    drawBG(0);
    ctx.save();
    // Title
    ctx.textAlign = 'center';
    ctx.shadowColor = '#FFB300';
    ctx.shadowBlur = 28;
    ctx.fillStyle = '#FFD040';
    ctx.font = 'bold 28px sans-serif';
    ctx.fillText('Dragon', W/2, 130);
    ctx.fillText('Gem Catcher', W/2, 164);
    ctx.shadowBlur = 0;

    // Dragon preview
    drawDragon(W/2, H/2 - 30);

    // Gem preview
    const t = Date.now() / 1000;
    GEM_TYPES.forEach((gt, i) => {
      const px = W/2 - 36 + i * 36;
      const py = H/2 + 60 + Math.sin(t * 1.5 + i) * 5;
      drawGem({ x: px, y: py, type: gt, rot: t * 0.8 + i });
    });

    // Instructions
    ctx.fillStyle = 'rgba(255,255,255,.55)';
    ctx.font = '12px sans-serif';
    ctx.fillText('金：+1　赤：+2　緑：+3', W/2, H/2 + 110);
    ctx.fillText('ライフ 3 個　宝石を落とすと1個減少', W/2, H/2 + 128);

    ctx.fillStyle = 'rgba(255,0,0,.7)';
    ctx.font = 'bold 13px sans-serif';
    ctx.fillText('シークレット企画なので、', W/2, H/2 + 165);
    ctx.fillText('SNSへの投稿や情報拡散はしないでね！', W/2, H/2 + 185);

    // Start prompt
    const pulse = 0.65 + 0.35 * Math.sin(Date.now() / 400);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#FFD040';
    ctx.font = 'bold 15px sans-serif';
    ctx.fillText('タップ / クリック でスタート', W/2, H - 60);
    ctx.globalAlpha = 1;

    // キャッシュ済みX IDを表示
    if (scoreXId) {
      ctx.fillStyle = 'rgba(255,255,255,.40)';
      ctx.font = '11px sans-serif';
      ctx.fillText('@' + scoreXId, W/2, H - 34);
    }
    ctx.restore();
  }

  function drawOverScreen() {
    // Dim overlay
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.textAlign = 'center';

    ctx.fillStyle = '#FF5090';
    ctx.font = 'bold 36px sans-serif';
    ctx.shadowColor = '#FF5090';
    ctx.shadowBlur = 20;
    ctx.fillText('GAME OVER', W/2, H/2 - 60);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#FFD040';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('Score: ' + score, W/2, H/2 - 14);

    const isNewBest = hi === score && score > 0;
    ctx.fillStyle = isNewBest ? '#3EEEAD' : 'rgba(255,255,255,.55)';
    ctx.font = '14px sans-serif';
    ctx.fillText((isNewBest ? '★ NEW BEST! ' : 'Best: ') + hi, W/2, H/2 + 16);

    if (scoreSubmitMsg) {
      const isSending = scoreSubmitMsg === '送信中...';
      const msgColor = isSending ? '#FFD040' : '#3EEEAD';
      const bgX = 20, bgW = W - 40, bgH = 30, bgY = H/2 + 26;
      ctx.fillStyle = isSending ? 'rgba(255,210,40,0.10)' : 'rgba(62,238,173,0.12)';
      ctx.strokeStyle = isSending ? 'rgba(255,210,40,0.55)' : 'rgba(62,238,173,0.65)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(bgX, bgY, bgW, bgH, 7);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = msgColor;
      ctx.font = 'bold 11px sans-serif';
      ctx.fillText(scoreSubmitMsg, W/2, H/2 + 46);
    }

    const retryY = (isNewBest || scoreSubmitMsg) ? H/2 + 80 : H/2 + 60;
    const pulse = 0.65 + 0.35 * Math.sin(Date.now() / 400);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#FFD040';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText('タップ / クリック でリトライ', W/2, retryY);
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  // --- Main loop ---
  function loop(ts) {
    animId = requestAnimationFrame(loop);
    const dt = Math.min((ts - lastTime) / 16.67, 3);
    lastTime = ts;
    frame++;

    if (state === 'start') {
      drawStartScreen();
      return;
    }

    if (state === 'over') {
      drawBG(ts);
      // draw remaining gems fading
      for (const g of gems) drawGem(g);
      drawOverScreen();
      return;
    }

    // --- Update playing ---
    const sp = BASE_SPEED * speedMult() * dt;

    // Dragon movement — keyboard easing; touch sets position directly above
    const dx = dragon.targetX - dragon.x;
    dragon.x += dx * 0.18 * dt;
    if (keys['ArrowLeft'] || keys['a'] || keys['A'])  dragon.x -= 6 * dt;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dragon.x += 6 * dt;
    dragon.x = Math.max(MARGIN, Math.min(W - MARGIN, dragon.x));
    dragon.bobT += 0.06 * dt;

    // Gems
    spawnTimer += dt;
    const si = spawnInterval / speedMult();
    if (spawnTimer >= si) { spawnGem(); spawnTimer = 0; }

    const dragonY = H - 70;

    gems = gems.filter(g => {
      g.y += sp;
      g.rot += 0.03 * dt;

      // Catch check (hitbox matches visual: dragon center vs gem center)
      const d = Math.hypot(g.x - dragon.x, g.y - dragonY);
      if (d < CATCH_R) {
        score += g.type.pts;
        if (score > hi) { hi = score; localStorage.setItem(HI_KEY, hi); }
        burst(g.x, g.y, g.type.color);
        return false;
      }
      // Miss
      if (g.y > H + GEM_SIZE) {
        lives--;
        missFlash = 18;
        if (lives <= 0) {
          state = 'over';
          scoreSubmitMsg = '';
          handleGameOver(score);
        }
        return false;
      }
      return true;
    });

    // Particles
    particles = particles.filter(p => {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 0.12 * dt;
      p.life -= p.decay * dt;
      return p.life > 0;
    });

    if (missFlash > 0) missFlash -= dt;

    // --- Draw ---
    drawBG(ts);

    // shadow / alpha を毎フレームリセットしてジェムのフリッカーを防ぐ
    ctx.globalAlpha  = 1;
    ctx.shadowBlur   = 0;
    ctx.shadowColor  = 'transparent';

    // Miss flash overlay
    if (missFlash > 0) {
      ctx.fillStyle = `rgba(255,50,50,${missFlash / 18 * 0.22})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Gems
    for (const g of gems) drawGem(g);

    // shadow リセット（パーティクルの shadow がジェムに影響しないよう）
    ctx.shadowBlur  = 0;
    ctx.shadowColor = 'transparent';

    // Particles
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle   = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // パーティクル後も shadow リセット
    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
    ctx.shadowColor = 'transparent';

    // Dragon
    const bobY = Math.sin(dragon.bobT) * 3;
    drawDragon(dragon.x, dragonY + bobY);

    // HUD
    drawHUD();
  }

  // Start render loop (after optional image preload)
  loadImages(() => {
    requestAnimationFrame(ts => { lastTime = ts; loop(ts); });
  });

})();
</script>
</body>
</html>
